<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <!-- Tło - łagodny ciemny gradient -->
    <radialGradient id="bg-gradient" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </radialGradient>

    <!-- Gradienty dla elementów graficznych -->
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>

    <linearGradient id="purple-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>

    <linearGradient id="emerald-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>

    <linearGradient id="amber-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>

    <linearGradient id="rose-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f43f5e" />
      <stop offset="100%" stop-color="#e11d48" />
    </linearGradient>

    <!-- Delikatny efekt poświaty (glow) dla neonowego wyglądu -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Tło obszaru -->
  <rect width="100%" height="100%" fill="url(#bg-gradient)" />

  <!-- Siatka matematyczna w tle -->
  <g opacity="0.07" stroke="#94a3b8" stroke-width="1">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,355 L 800,355 M 0,400 L 800,400 M 0,450 L 800,450" />
    <path d="M 100,0 L 100,500 M 200,0 L 200,500 M 300,0 L 300,500 M 400,0 L 400,500 M 500,0 L 500,500 M 600,0 L 600,500 M 700,0 L 700,500" />
  </g>

  <!-- Wykres funkcji (sinusoida) w tle -->
  <path d="M 50,250 C 200,100 200,400 400,250 C 600,100 600,400 750,250" fill="none" stroke="#334155" stroke-width="3" opacity="0.4" />

  <!-- STATYCZNY ŚRODEK (Układ współrzędnych i punkt centralny) -->
  <g opacity="0.5">
    <line x1="220" y1="250" x2="580" y2="250" stroke="#475569" stroke-width="2" stroke-dasharray="4 4" />
    <line x1="400" y1="70" x2="400" y2="430" stroke="#475569" stroke-width="2" stroke-dasharray="4 4" />
    <circle cx="400" cy="250" r="6" fill="#475569" />
  </g>

  <!-- ELEMENTY ANIMOWANE PRZEZ GSAP -->

  <!-- 1. Obrót w prawo (Klasa: math-dashed) -> Zewnętrzny pierścień przerywany -->
  <g class="math-dashed">
    <circle cx="400" cy="250" r="150" stroke="url(#blue-grad)" stroke-width="3" stroke-dasharray="12 16" fill="none" opacity="0.8" filter="url(#glow)" />
  </g>

  <!-- 2. Obrót w lewo (Klasa: gsap-rotate-ccw) -> Wewnętrzny pierścień ze współrzędnymi -->
  <g class="gsap-rotate-ccw">
    <circle cx="400" cy="250" r="100" stroke="url(#purple-grad)" stroke-width="4" stroke-dasharray="80 20 40 20" fill="none" opacity="0.9" filter="url(#glow)" />
    <circle cx="400" cy="250" r="80" stroke="#f43f5e" stroke-width="1.5" stroke-dasharray="4 6" fill="none" opacity="0.5" />
  </g>

  <!-- 3. Unoszenie pionowe (Klasa: math-triangle) -> Trójkąt po lewej stronie -->
  <g class="math-triangle">
    <polygon points="200,110 245,190 155,190" fill="url(#emerald-grad)" filter="url(#glow)" />
    <!-- Wewnętrzne wycięcie dla lżejszego wyglądu -->
    <polygon points="200,135 228,180 172,180" fill="#1e293b" />
    <!-- Oznaczenie kąta -->
    <path d="M 167,180 A 15,15 0 0,1 177,167" fill="none" stroke="#34d399" stroke-width="2" />
  </g>

  <!-- 4. Pulsowanie i obrót (Klasa: math-square) -> Kwadrat po prawej stronie -->
  <g class="math-square">
    <rect x="550" y="290" width="90" height="90" rx="16" fill="url(#amber-grad)" filter="url(#glow)" />
    <rect x="568" y="308" width="54" height="54" rx="10" fill="#1e293b" />
    <!-- Przekątna kwadratu -->
    <line x1="568" y1="362" x2="622" y2="308" stroke="#fbbf24" stroke-width="2" stroke-dasharray="3 3" />
  </g>

  <!-- 5. Bounce typ 1 (Klasa: gsap-plus) -> Symbol plusa na dole po lewej -->
  <g class="gsap-plus">
    <path d="M 180,340 L 220,340 M 200,320 L 200,360" stroke="url(#rose-grad)" stroke-width="10" stroke-linecap="round" filter="url(#glow)" />
  </g>

  <!-- 6. Bounce typ 2 (Klasa: gsap-equal) -> Symbol równości na górze po prawej -->
  <g class="gsap-equal">
    <line x1="570" y1="140" x2="610" y2="140" stroke="url(#blue-grad)" stroke-width="8" stroke-linecap="round" filter="url(#glow)" />
    <line x1="570" y1="156" x2="610" y2="156" stroke="url(#blue-grad)" stroke-width="8" stroke-linecap="round" filter="url(#glow)" />
  </g>
</svg>